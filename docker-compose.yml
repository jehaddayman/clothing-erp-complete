version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: clothing-erp-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: clothing-erp-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/clothing_erp
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CLIENT_URL: http://localhost:5173
      COOKIE_SECURE: 'false'
    depends_on:
      - mongo

volumes:
  mongo-data:
